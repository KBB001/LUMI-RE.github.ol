<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Страница не найдена · LUMIÈRE</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #F8F2EA;
      --beige: #EDE4D5;
      --rose: #D4907E;
      --near-black: #1A1410;
      --muted: #8C6E60;
      --font-s: 'Cormorant Garamond', Georgia, serif;
      --font-u: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-u);
      background: var(--cream);
      color: var(--near-black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
      position: relative;
    }

    /* Animated glow orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float 6s ease-in-out infinite;
      pointer-events: none;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: var(--rose);
      top: -120px; right: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: #C8A040;
      bottom: -80px; left: -80px;
      animation-delay: 2s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: #E8C4B8;
      top: 40%; left: 60%;
      animation-delay: 1s;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    .logo {
      font-family: var(--font-s);
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    .error-code {
      font-family: var(--font-s);
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 300;
      line-height: 1;
      color: var(--near-black);
      margin-bottom: 16px;
      opacity: 0.1;
      position: relative;
    }
    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      opacity: 1;
      background: linear-gradient(135deg, var(--near-black), var(--rose));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title {
      font-family: var(--font-s);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 400;
      color: var(--near-black);
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .title em {
      font-style: italic;
      color: var(--rose);
    }

    .desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 14px 28px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }
    .btn-primary {
      background: var(--near-black);
      color: var(--cream);
      box-shadow: 0 4px 20px rgba(30,15,5,.25);
    }
    .btn-primary:hover {
      background: #2E2018;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(30,15,5,.3);
    }
    .btn-ghost {
      background: transparent;
      color: var(--near-black);
      border: 1.5px solid rgba(30,20,10,.2);
    }
    .btn-ghost:hover {
      background: rgba(30,15,5,.06);
      border-color: var(--near-black);
    }

    .redirect-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 40px;
      opacity: 0.6;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid rgba(30,15,5,.08);
    }
    .nav-links a {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--near-black); }

    /* Particle animation */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: drift linear infinite;
      opacity: 0.4;
    }
    @keyframes drift {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-20px) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="content">
    <div class="logo">LUMIÈRE</div>
    <div class="error-code">404</div>
    <h1 class="title">Страница <em>не найдена</em></h1>
    <p class="desc">
      Похоже, эта страница переехала или была удалена.<br/>
      Но у нас ещё столько красоты — давайте найдём то, что вам нужно.
    </p>
    <div class="actions">
      <a href="index.html" class="btn btn-primary">← На главную</a>
      <a href="index.html#arrivals" class="btn btn-ghost">Каталог</a>
    </div>

    <div class="nav-links">
      <a href="index.html#collection">Коллекции</a>
      <a href="index.html#brands">Бренды</a>
      <a href="index.html#story">О нас</a>
      <a href="index.html#contact">Контакты</a>
      <a href="register.html">Регистрация</a>
    </div>

    <p class="redirect-note" id="redirectNote">
      Автоматический переход на главную через <span id="countdown">10</span> сек.
    </p>
  </div>

  <script>
    // Auto-redirect countdown
    let sec = 10;
    const el = document.getElementById('countdown');
    const timer = setInterval(() => {
      sec--;
      if (el) el.textContent = sec;
      if (sec <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);

    // Generate floating particles
    const container = document.getElementById('particles');
    if (container) {
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 3;
        const colors = ['#D4907E', '#C8A040', '#E8C4B8', '#C9B89A'];
        p.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${Math.random() * 100}%;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-duration: ${Math.random() * 8 + 6}s;
          animation-delay: ${Math.random() * 6}s;
        `;
        container.appendChild(p);
      }
    }
  </script>
</body>
</html>
